<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333;font-size:14px;}
/* 顶部 */
.header{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#37474F,#546E7A);color:#fff;padding:12px 16px;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header-title{font-size:18px;font-weight:bold;}
.header-back{font-size:20px;cursor:pointer;padding:4px 8px;}
/* 容器 */
.container{padding:60px 16px 80px;max-width:750px;margin:0 auto;}
/* 登录卡片 */
.login-card{background:#fff;border-radius:12px;padding:32px 24px;margin:20px 0;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.login-title{font-size:18px;font-weight:bold;text-align:center;margin-bottom:20px;color:#37474F;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:13px;color:#666;margin-bottom:6px;}
.form-input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none;}
.form-input:focus{border-color:#37474F;}
.btn-login{width:100%;padding:12px;background:#37474F;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px;}
.btn-login:active{background:#263238;}
/* 主内容 */
.panel{padding-top:8px;}
/* Tab */
.tab-nav{display:flex;background:#fff;border-radius:8px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tab-nav-item{flex:1;text-align:center;padding:10px 8px;font-size:13px;color:#666;cursor:pointer;border-right:1px solid #eee;}
.tab-nav-item:last-child{border-right:none;}
.tab-nav-item.active{background:#37474F;color:#fff;font-weight:bold;}
/* 卡片 */
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-name{font-size:15px;font-weight:bold;margin-bottom:4px;}
.card-info{font-size:12px;color:#888;margin-bottom:4px;}
.card-actions{display:flex;gap:8px;margin-top:8px;}
.btn-ok{flex:1;padding:8px;background:#4CAF50;color:#fff;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:13px;}
.btn-no{flex:1;padding:8px;background:#F44336;color:#fff;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:13px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;}
.badge-w{background:#FF9800;color:#fff;}
.badge-g{background:#4CAF50;color:#fff;}
.badge-r{background:#F44336;color:#fff;}
/* 空状态 */
.empty{text-align:center;padding:40px 20px;color:#999;font-size:14px;}
.empty-icon{font-size:48px;display:block;margin-bottom:12px;}
/* 统计 */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-val{font-size:24px;font-weight:bold;color:#37474F;}
.stat-lbl{font-size:12px;color:#999;margin-top:4px;}
/* 弹窗 */
.mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;}
.popup{background:#fff;border-radius:12px;padding:20px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;}
.popup-t{font-size:16px;font-weight:bold;margin-bottom:12px;}
/* toast */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:999;display:none;}
</style>
</head>
<body>
<div class="header">
  <span class="header-back" onclick="history.back()">←</span>
  <span class="header-title">⚙️ 后台管理</span>
  <span style="width:40px"></span>
</div>
<div class="container" id="mainContainer"><div class="empty"><span class="empty-icon">⏳</span>加载中...</div></div>
<div id="toast"></div>

<script>
(function() {
  // ===== Storage =====
  var S = {
    get: function(k, def) {
      try { var v = localStorage.getItem('village_' + k); return v ? JSON.parse(v) : def; } catch(e) { return def; }
    },
    set: function(k, v) {
      try { localStorage.setItem('village_' + k, JSON.stringify(v)); return true; } catch(e) { return false; }
    }
  };

  // ===== 状态 =====
  var isLoggedIn = false;
  var curTab = 'chiefs';

  // ===== 管理员账号（本地，可改） =====
  var ADMIN_USER = 'admin';
  var ADMIN_PWD = 'admin123';

  // ===== toast =====
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 2000);
  }

  // ===== 渲染 =====
  function loadUI() {
    var c = document.getElementById('mainContainer');
    if (!isLoggedIn) { showLogin(c); }
    else { showPanel(c); }
  }

  function showLogin(c) {
    c.innerHTML =
      '<div class="login-card">' +
        '<div class="login-title">🔐 管理员登录</div>' +
        '<div class="form-group"><label class="form-label">管理员账号</label>' +
        '<input class="form-input" id="inUser" value="admin" placeholder="账号"></div>' +
        '<div class="form-group"><label class="form-label">管理员密码</label>' +
        '<input class="form-input" id="inPwd" type="password" placeholder="密码" value="admin123"></div>' +
        '<button class="btn-login" onclick="doLogin()">登录</button>' +
      '</div>';
  }

  function doLogin() {
    var u = document.getElementById('inUser').value.trim();
    var p = document.getElementById('inPwd').value;
    if (u === ADMIN_USER && p === ADMIN_PWD) {
      isLoggedIn = true;
      sessionStorage.setItem('village_admin_logged', 'true');
      loadUI();
    } else {
      toast('账号或密码错误');
    }
  }

  function showPanel(c) {
    var regs = S.get('registrations', []);
    c.innerHTML =
      '<div class="stats" id="stats"></div>' +
      '<div class="tab-nav">' +
        '<div class="tab-nav-item active" onclick="switchTab(\'chiefs\',this)">村主任</div>' +
        '<div class="tab-nav-item" onclick="switchTab(\'roles\',this)">其他角色</div>' +
        '<div class="tab-nav-item" onclick="switchTab(\'products\',this)">农产品</div>' +
        '<div class="tab-nav-item" onclick="switchTab(\'villages\',this)">村庄</div>' +
      '</div>' +
      '<div class="panel" id="panel"></div>';
    renderStats();
    renderPanel();
  }

  function renderStats() {
    var regs = S.get('registrations', []);
    var pending = regs.filter(function(r) { return r.status === '待审核'; }).length;
    var passed = regs.filter(function(r) { return r.status === '已通过'; }).length;
    var rejected = regs.filter(function(r) { return r.status === '已拒绝'; }).length;
    document.getElementById('stats').innerHTML =
      '<div class="stat"><div class="stat-val">' + pending + '</div><div class="stat-lbl">待审核</div></div>' +
      '<div class="stat"><div class="stat-val">' + passed + '</div><div class="stat-lbl">已通过</div></div>';
  }

  function switchTab(tab, el) {
    curTab = tab;
    document.querySelectorAll('.tab-nav-item').forEach(function(e) { e.classList.remove('active'); });
    el.classList.add('active');
    renderPanel();
  }

  function renderPanel() {
    var panel = document.getElementById('panel');
    var regs = S.get('registrations', []);
    var chiefs = regs.filter(function(r) { return (r.role || r.type) === '村主任'; });
    var others = regs.filter(function(r) { return (r.role || r.type) !== '村主任' && r.role !== '管理员' && r.role !== '游客'; });
    var products = S.get('products', []);
    var villages = S.get('villages', []);

    var items = [];
    if (curTab === 'chiefs') items = chiefs;
    else if (curTab === 'roles') items = others;
    else if (curTab === 'products') {
      panel.innerHTML = products.length === 0 ? '<div class="empty"><span class="empty-icon">📦</span>暂无农产品</div>' :
        products.map(function(p) {
          return '<div class="card"><div class="card-name">' + esc(p.name || p.productName || '未命名') + '</div>' +
            '<div class="card-info">价格:¥' + esc(p.price || '?') + ' | 库存:' + esc(p.stock || '?') + '</div>' +
            '<div class="card-actions">' +
              (p.status === '待审核' ? '<button class="btn-ok" onclick="approveProduct(\'' + (p.id || '') + '\')">通过</button><button class="btn-no" onclick="rejectProduct(\'' + (p.id || '') + '\')">拒绝</button>' : '<span class="badge badge-g">已通过</span>') +
            '</div></div>';
        }).join('');
      return;
    } else if (curTab === 'villages') {
      panel.innerHTML = villages.length === 0 ? '<div class="empty"><span class="empty-icon">🏘️</span>暂无村庄</div>' :
        villages.map(function(v) {
          return '<div class="card"><div class="card-name">' + esc(v.name || '未命名') + '</div>' +
            '<div class="card-info">地址:' + esc(v.address || '未知') + '</div></div>';
        }).join('');
      return;
    }

    if (items.length === 0) {
      var icons = { chiefs: '👤', roles: '👥', products: '📦' };
      var names = { chiefs: '村主任注册', roles: '其他角色注册', products: '农产品' };
      panel.innerHTML = '<div class="empty"><span class="empty-icon">' + (icons[curTab] || '📋') + '</span>暂无' + (names[curTab] || curTab) + '申请</div>';
      return;
    }

    panel.innerHTML = items.map(function(r) {
      var badge = r.status === '待审核' ? '<span class="badge badge-w">待审核</span>' :
                  r.status === '已通过' ? '<span class="badge badge-g">已通过</span>' :
                  '<span class="badge badge-r">已拒绝</span>';
      var name = esc(r.name || r.chiefName || r.username || '未填');
      var role = esc(r.role || r.type || '未知');
      var village = esc(r.village || r.registeredVillage || '未选');
      var phone = esc(r.phone || r.tel || '未填');
      var time = esc(r.createdAt || r.time || '');
      var info = '角色:' + role + (village ? ' | 村庄:' + village : '') + (phone ? ' | 电话:' + phone : '') + (time ? ' | ' + time : '');
      var actions = r.status === '待审核' ?
        '<button class="btn-ok" onclick="doApprove(\'' + (r.id || '') + '\')">通过</button>' +
        '<button class="btn-no" onclick="doReject(\'' + (r.id || '') + '\')">拒绝</button>' : badge;
      return '<div class="card"><div class="card-name">' + name + ' ' + badge + '</div><div class="card-info">' + info + '</div><div class="card-actions">' + actions + '</div></div>';
    }).join('');
  }

  function doApprove(id) {
    if (!id) { toast('无效ID'); return; }
    var regs = S.get('registrations', []);
    var idx = -1;
    for (var i = 0; i < regs.length; i++) { if (regs[i].id == id) { idx = i; break; } }
    if (idx < 0) { toast('未找到记录'); return; }
    var reg = regs[idx];
    var role = reg.role || reg.type || '';
    var village = reg.village || reg.registeredVillage || '';
    reg.status = '已通过';
    regs[idx] = reg;
    S.set('registrations', regs);
    // 写入对应数据表
    if (role === '村主任') {
      var v = S.get('villages', []);
      var found = false;
      for (var j = 0; j < v.length; j++) { if (v[j].name === village) { found = true; break; } }
      if (!found) { v.push({ id: reg.id, name: village, chiefName: reg.name, phone: reg.phone || reg.tel || '', status: '已通过', createdAt: reg.createdAt || new Date().toISOString() }); }
      S.set('villages', v);
    }
    // 更新当前记录
    regs = S.get('registrations', []);
    S.set('registrations', regs);
    toast('已通过');
    renderStats();
    renderPanel();
  }

  function doReject(id) {
    if (!id) { toast('无效ID'); return; }
    var regs = S.get('registrations', []);
    var idx = -1;
    for (var i = 0; i < regs.length; i++) { if (regs[i].id == id) { idx = i; break; } }
    if (idx < 0) { toast('未找到记录'); return; }
    regs[idx].status = '已拒绝';
    S.set('registrations', regs);
    toast('已拒绝');
    renderStats();
    renderPanel();
  }

  function approveProduct(id) {
    if (!id) return;
    var ps = S.get('products', []);
    for (var i = 0; i < ps.length; i++) { if (ps[i].id == id) { ps[i].status = '已通过'; break; } }
    S.set('products', ps);
    toast('已通过');
    renderPanel();
  }

  function rejectProduct(id) {
    if (!id) return;
    var ps = S.get('products', []);
    for (var i = 0; i < ps.length; i++) { if (ps[i].id == id) { ps[i].status = '已拒绝'; break; } }
    S.set('products', ps);
    toast('已拒绝');
    renderPanel();
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== 检查登录状态 =====
  var saved = sessionStorage.getItem('village_admin_logged');
  if (saved === 'true') isLoggedIn = true;

  // ===== 启动 =====
  loadUI();

})();
</script>
</body>
</html>
